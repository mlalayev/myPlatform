version: "3.8"

services:
  # Yalnız PostgreSQL verilənlər bazası
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=murad
      - POSTGRES_PASSWORD=SeninSehfre123!
      - POSTGRES_DB=mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Kod icra üçün ayrı servis (yalnız compiler-lər və runtime-lar)
  code-executor:
    build: 
      context: .
      dockerfile: Dockerfile.executor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    restart: unless-stopped
    privileged: true
    # Bu servis yalnız kod icra üçün istifadə olunacaq, port expose etmirik

volumes:
  postgres_data:
