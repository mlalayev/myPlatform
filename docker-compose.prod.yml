version: "3.8"

services:
  # Production Next.js tətbiqi
  app:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    command: npm start

  # PostgreSQL verilənlər bazası
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-murad}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SeninSehfre123!}
      - POSTGRES_DB=${POSTGRES_DB:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # Production-da port expose etmirik - yalnız internal network

  # Kod icra üçün ayrı servis
  code-executor:
    build: 
      context: .
      dockerfile: Dockerfile.executor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    restart: unless-stopped
    privileged: true
    # Bu servis yalnız kod icra üçün istifadə olunacaq

volumes:
  postgres_data: 